<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>首页说明</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 20px;
      line-height: 1.7;
      color: #333;
    }
    h1 { color: #1f6feb; }
    .step {
      background: #f6f8fa;
      border-left: 4px solid #1f6feb;
      padding: 16px 20px;
      margin: 16px 0;
      border-radius: 0 8px 8px 0;
    }
    code {
      background: #e5e7eb;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>使用说明</h1>
  <div class="step">
    <strong>1.</strong> 将 HTML 文件放入 <code>pages/</code> 目录，支持任意层级子目录。
  </div>
  <div class="step">
    <strong>2.</strong> 推送代码到 GitHub，Actions 会自动更新索引。
  </div>
  <div class="step">
    <strong>3.</strong> 在首页左侧导航树中点击文件即可预览。
  </div>
</body>
</html>
