<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HTML Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f7;
      --bg-sidebar: rgba(255, 255, 255, 0.72);
      --bg-sidebar-solid: #f8f8fa;
      --bg-hover: rgba(0, 0, 0, 0.035);
      --bg-active: rgba(0, 0, 0, 0.06);
      --bg-item-hover: rgba(0, 0, 0, 0.04);
      --border-color: rgba(0, 0, 0, 0.07);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #86868b;
      --accent: #0071e3;
      --accent-soft: rgba(0, 113, 227, 0.08);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.03);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      letter-spacing: -0.01em;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      min-width: 300px;
      height: 100vh;
      background: var(--bg-sidebar);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #e8e8ed 0%, #d2d2d7 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), var(--shadow-sm);
    }

    .brand h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .brand-sub {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 400;
      padding-left: 42px;
      line-height: 1.4;
    }

    /* Collapse Toggle */
    .collapse-btn {
      position: absolute;
      right: 12px;
      top: 24px;
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(0,0,0,0.04);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      transition: all var(--transition-fast);
      z-index: 20;
    }

    .collapse-btn:hover {
      background: rgba(0,0,0,0.08);
      color: var(--text-primary);
    }

    .collapse-btn svg {
      transition: transform var(--transition-base);
    }

    .sidebar.collapsed .collapse-btn svg {
      transform: rotate(180deg);
    }

    /* Sidebar Collapsed State */
    .sidebar {
      transition: width var(--transition-slow), min-width var(--transition-slow);
    }

    .sidebar.collapsed {
      width: 44px;
      min-width: 44px;
    }

    .sidebar.collapsed .sidebar-header,
    .sidebar.collapsed .search-wrap,
    .sidebar.collapsed .tree-scroll {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-fast);
    }

    .sidebar .sidebar-header,
    .sidebar .search-wrap,
    .sidebar .tree-scroll {
      transition: opacity var(--transition-slow);
    }

    .sidebar.collapsed .collapse-btn {
      right: 8px;
      top: 12px;
    }

    .search-wrap {
      padding: 8px 16px 12px;
      flex-shrink: 0;
    }

    .search-box {
      width: 100%;
      padding: 8px 14px 8px 34px;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 450;
      outline: none;
      transition: all var(--transition-fast);
      position: relative;
    }

    .search-box::placeholder {
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .search-box:focus {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(0, 113, 227, 0.3);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.08);
    }

    .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 12px;
      pointer-events: none;
      z-index: 1;
      transition: color var(--transition-fast);
    }

    .search-wrap:focus-within .search-icon {
      color: var(--accent);
    }

    .tree-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 10px 20px;
    }

    .tree-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .tree-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .tree-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.1);
      border-radius: 10px;
    }

    .tree-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(0,0,0,0.18);
    }

    /* Tree Items */
    .tree-item {
      user-select: none;
      animation: fadeIn 0.3s ease-out both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tree-item-content {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      margin: 1px 0;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
      font-size: 13px;
      font-weight: 450;
      color: var(--text-secondary);
      overflow: hidden;
    }

    .tree-item-content::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
      transform: scaleY(0);
      transition: transform var(--transition-base);
    }

    .tree-item-content:hover {
      background: var(--bg-item-hover);
      color: var(--text-primary);
    }

    .tree-item-content.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }

    .tree-item-content.active::before {
      transform: scaleY(1);
    }

    .tree-item-content .arrow {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform var(--transition-base);
      color: var(--text-tertiary);
      font-size: 9px;
    }

    .tree-item-content .arrow.collapsed {
      transform: rotate(-90deg);
    }

    .tree-item-content .icon {
      width: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      opacity: 0.75;
      transition: opacity var(--transition-fast);
    }

    .tree-item-content:hover .icon {
      opacity: 1;
    }

    .tree-item-content.active .icon {
      opacity: 1;
    }

    .tree-item-content .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      padding-right: 4px;
    }

    .tree-children {
      padding-left: 10px;
      overflow: hidden;
      transition: max-height var(--transition-slow), opacity var(--transition-base);
      max-height: 2000px;
      opacity: 1;
      transform-origin: top;
    }

    .tree-children.collapsed {
      max-height: 0;
      opacity: 0;
    }

    .tree-item.hidden {
      display: none;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    /* Main Content */
    .main {
      flex: 1;
      height: 100vh;
      position: relative;
      background: #ffffff;
      overflow: hidden;
    }

    .main iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
      opacity: 0;
      animation: iframeFadeIn 0.4s ease-out 0.1s forwards;
    }

    @keyframes iframeFadeIn {
      from { opacity: 0; transform: scale(0.995); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Welcome Screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
      animation: welcomeIn 0.6s ease-out;
    }

    @keyframes welcomeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome .logo-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(145deg, #f0f0f2, #e4e4e8);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.6);
      animation: logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 340px;
      line-height: 1.7;
      font-weight: 400;
    }

    .welcome .hint {
      margin-top: 32px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: var(--radius-md);
      font-size: 12px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .welcome .hint code {
      background: rgba(0, 0, 0, 0.06);
      padding: 2px 8px;
      border-radius: 5px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 6px;
    }

    .loading-dot {
      width: 7px;
      height: 7px;
      background: var(--text-tertiary);
      border-radius: 50%;
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .loading-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* Staggered animation delays for tree */
    .tree-item:nth-child(1) { animation-delay: 0.02s; }
    .tree-item:nth-child(2) { animation-delay: 0.04s; }
    .tree-item:nth-child(3) { animation-delay: 0.06s; }
    .tree-item:nth-child(4) { animation-delay: 0.08s; }
    .tree-item:nth-child(5) { animation-delay: 0.10s; }
    .tree-item:nth-child(6) { animation-delay: 0.12s; }
    .tree-item:nth-child(7) { animation-delay: 0.14s; }
    .tree-item:nth-child(8) { animation-delay: 0.16s; }

    /* Mobile menu button & backdrop: hidden on desktop, revealed by media query */
    .menu-btn {
      display: none;
    }

    .sidebar-backdrop {
      display: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        flex-direction: row;
      }

      /* Sidebar becomes a slide-in drawer overlaying the main content */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: min(300px, 85vw);
        min-width: 0;
        height: 100dvh;
        transform: translateX(-100%);
        transition: transform var(--transition-base);
        z-index: 100;
        border-right: 1px solid var(--border-color);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      /* Neutralize the desktop "collapsed" (44px) state on mobile —
         the drawer pattern replaces the collapse affordance */
      .sidebar.collapsed {
        width: min(300px, 85vw);
        min-width: 0;
      }

      .sidebar.collapsed .sidebar-header,
      .sidebar.collapsed .search-wrap,
      .sidebar.collapsed .tree-scroll {
        opacity: 1;
        pointer-events: auto;
      }

      .collapse-btn {
        display: none;
      }

      .sidebar-header {
        padding-top: calc(24px + env(safe-area-inset-top));
      }

      .tree-scroll {
        padding-bottom: calc(20px + env(safe-area-inset-bottom));
      }

      /* Dimmed backdrop shown when the drawer is open */
      .sidebar-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.32);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-base);
        z-index: 90;
      }

      .sidebar-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      /* Hamburger trigger, fixed at top-left, mobile only */
      .menu-btn {
        display: flex;
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        left: 12px;
        width: 40px;
        height: 40px;
        border: none;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border-radius: 10px;
        box-shadow: var(--shadow-sm);
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        cursor: pointer;
        z-index: 80;
        transition: transform var(--transition-fast);
      }

      .menu-btn:active {
        transform: scale(0.94);
      }

      .main {
        height: 100vh;
        width: 100%;
      }

      /* Welcome screen scales down for small viewports */
      .welcome {
        padding: 72px 24px 24px;
      }

      .welcome .logo-wrap {
        width: 60px;
        height: 60px;
        font-size: 24px;
        border-radius: 18px;
        margin-bottom: 22px;
      }

      .welcome h2 {
        font-size: 19px;
      }

      .welcome p {
        font-size: 13px;
        max-width: 280px;
      }

      /* Larger tap targets for touch input */
      .tree-item-content {
        padding-top: 9px;
        padding-bottom: 9px;
        margin: 2px 0;
      }
    }
  </style>
</head>
<body>
  <button class="menu-btn" id="menuBtn" aria-label="打开导航菜单" aria-expanded="false" aria-controls="sidebar">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </button>
  <aside class="sidebar" id="sidebar">
    <button class="collapse-btn" id="collapseBtn" title="收起侧边栏 [">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">◈</div>
        <h1>HTML Note</h1>
      </div>
      <div class="brand-sub">文件导航系统</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">◈</span>
      <input type="text" class="search-box" placeholder="搜索文件..." id="search" autocomplete="off">
    </div>
    <div class="tree-scroll">
      <div class="tree" id="tree">
        <div class="loading">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

  <main class="main" id="main">
    <div class="welcome">
      <div class="logo-wrap">◈</div>
      <h2>HTML 文件导航系统</h2>
      <p>在左侧选择文件，或将 HTML 文件放入 pages/ 目录后推送至仓库</p>
      <div class="hint">
        <span>目录：</span><code>pages/</code>
      </div>
    </div>
  </main>

  <script>
    let fileTree = [];
    let activePath = null;

    async function init() {
      try {
        const res = await fetch('index.json');
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        fileTree = data.tree || [];
        renderTree(fileTree, document.getElementById('tree'));
      } catch (e) {
        document.getElementById('tree').innerHTML =
          '<div class="empty-state">无法读取索引文件<br>请确保已运行 build.js</div>';
      }
    }

    function renderTree(tree, container, level = 0) {
      container.innerHTML = '';

      if (tree.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无文件</div>';
        return;
      }

      for (const item of tree) {
        const el = document.createElement('div');
        el.className = 'tree-item';
        el.dataset.name = item.name.toLowerCase();
        el.dataset.type = item.type;

        const content = document.createElement('div');
        content.className = 'tree-item-content';
        content.style.paddingLeft = (10 + level * 14) + 'px';

        if (item.type === 'folder') {
          const arrow = document.createElement('span');
          arrow.className = 'arrow';
          arrow.innerHTML = '<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M2.5 1.5L5.5 4.5L2.5 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          content.appendChild(arrow);

          const icon = document.createElement('span');
          icon.className = 'icon';
          icon.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4.5C2 3.67 2.67 3 3.5 3h2.17c.27 0 .52.11.71.29l1.83 1.83h4.79c.83 0 1.5.67 1.5 1.5v5.88c0 .83-.67 1.5-1.5 1.5H3.5c-.83 0-1.5-.67-1.5-1.5V4.5z" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.25)" stroke-width="1"/></svg>';
          content.appendChild(icon);

          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = item.name;
          content.appendChild(name);

          el.appendChild(content);

          const children = document.createElement('div');
          children.className = 'tree-children';
          renderTree(item.children, children, level + 1);
          el.appendChild(children);

          // 点击文件夹切换展开/折叠
          content.addEventListener('click', (e) => {
            e.stopPropagation();
            const isCollapsed = children.classList.toggle('collapsed');
            arrow.classList.toggle('collapsed', isCollapsed);
          });

          // 默认展开
          if (level < 2) {
            children.classList.remove('collapsed');
          } else {
            children.classList.add('collapsed');
            arrow.classList.add('collapsed');
          }
        } else {
          const spacer = document.createElement('span');
          spacer.style.width = '14px';
          spacer.style.flexShrink = '0';
          content.appendChild(spacer);

          const icon = document.createElement('span');
          icon.className = 'icon';
          icon.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M9.5 1.5H4.5C3.67 1.5 3 2.17 3 3v10c0 .83.67 1.5 1.5 1.5h7c.83 0 1.5-.67 1.5-1.5V5.5L9.5 1.5z" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.2)" stroke-width="1"/><path d="M9.5 1.5V5h3.5" stroke="rgba(0,0,0,0.2)" stroke-width="1"/></svg>';
          content.appendChild(icon);

          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = item.name;
          content.appendChild(name);

          content.addEventListener('click', (e) => {
            e.stopPropagation();
            loadPage(item.path);
            setActive(content);
            activePath = item.path;
            // 移动端选中文件后收起抽屉，让出空间预览内容
            closeMobileDrawer();
          });

          el.appendChild(content);
        }

        container.appendChild(el);
      }
    }

    function setActive(el) {
      document.querySelectorAll('.tree-item-content.active').forEach(a => a.classList.remove('active'));
      el.classList.add('active');
    }

    function loadPage(path) {
      const main = document.getElementById('main');
      main.innerHTML = `<iframe src="pages/${path}" sandbox="allow-scripts allow-same-origin"></iframe>`;
    }

    // Search with smooth filtering
    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      const allItems = document.querySelectorAll('.tree-item');

      if (!q) {
        allItems.forEach(item => {
          item.classList.remove('hidden');
        });
        return;
      }

      allItems.forEach(item => {
        const name = item.dataset.name;
        const isMatch = name && name.includes(q);
        item.classList.toggle('hidden', !isMatch);

        if (isMatch) {
          // 展开所有父级
          let parent = item.parentElement;
          while (parent) {
            if (parent.classList.contains('tree-children')) {
              parent.classList.remove('collapsed');
              const arrow = parent.previousElementSibling?.querySelector('.arrow');
              if (arrow) arrow.classList.remove('collapsed');
            }
            parent = parent.parentElement;
          }
        }
      });
    });

    // Sidebar collapse toggle (desktop) + mobile drawer logic
    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapseBtn');
    const menuBtn = document.getElementById('menuBtn');
    const backdrop = document.getElementById('sidebarBackdrop');
    const mainEl = document.getElementById('main');

    // 视口是否处于移动端断点（与 CSS media query 对齐）
    const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

    function toggleSidebar() {
      // 移动端由抽屉接管，不使用桌面 collapsed 状态
      if (isMobile()) {
        toggleMobileDrawer();
        return;
      }
      const isCollapsed = sidebar.classList.toggle('collapsed');
      collapseBtn.title = isCollapsed ? '展开侧边栏 [' : '收起侧边栏 [';
      localStorage.setItem('sidebarCollapsed', isCollapsed);
    }

    collapseBtn.addEventListener('click', toggleSidebar);

    // 移动端抽屉开关
    function openMobileDrawer() {
      sidebar.classList.add('open');
      backdrop.classList.add('open');
      backdrop.setAttribute('aria-hidden', 'false');
      menuBtn.setAttribute('aria-expanded', 'true');
      // 抽屉覆盖时把主内容置为 inert，避免键盘/读屏聚焦到背后
      mainEl.inert = true;
    }

    function closeMobileDrawer() {
      if (!sidebar.classList.contains('open')) return;
      sidebar.classList.remove('open');
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
      menuBtn.setAttribute('aria-expanded', 'false');
      mainEl.inert = false;
    }

    function toggleMobileDrawer() {
      if (sidebar.classList.contains('open')) {
        closeMobileDrawer();
      } else {
        openMobileDrawer();
      }
    }

    menuBtn.addEventListener('click', toggleMobileDrawer);
    backdrop.addEventListener('click', closeMobileDrawer);

    // 仅桌面端恢复 collapsed 状态；移动端不恢复，避免与抽屉冲突
    if (!isMobile() && localStorage.getItem('sidebarCollapsed') === 'true') {
      sidebar.classList.add('collapsed');
      collapseBtn.title = '展开侧边栏 [';
    }

    // 横竖屏切换 / 桌面↔移动端切换时清理抽屉残留状态
    window.addEventListener('resize', () => {
      if (!isMobile()) {
        closeMobileDrawer();
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
        e.preventDefault();
        document.getElementById('search').focus();
      }
      if (e.key === 'Escape') {
        // 移动端抽屉打开时优先关闭抽屉
        if (isMobile() && sidebar.classList.contains('open')) {
          closeMobileDrawer();
          return;
        }
        document.getElementById('search').value = '';
        document.getElementById('search').dispatchEvent(new Event('input'));
        document.getElementById('search').blur();
      }
      if (e.key === '[' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        if (document.activeElement !== document.getElementById('search')) {
          e.preventDefault();
          toggleSidebar();
        }
      }
    });

    init();
  </script>
</body>
</html>
